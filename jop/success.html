<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تم الطلب</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body onload="showOrder()">

<header>
  <img src="img/logo.png" class="logo">
</header>

<div class="container">

  <h2>🎉 تم الطلب بنجاح</h2>

  <p>📦 رقم الطلب:</p>
  <h3 id="orderId"></h3>

  <p>💰 المبلغ المدفوع:</p>
  <h3 id="amount"></h3>

  <a href="homepage.html">
    <button>العودة للرئيسية</button>
  </a>

</div>

<footer class="footer">
  <div class="footer-left">
    <h3>نجاة خليل</h3>
    <p> 0545400356</p>
  </div>

  <div class="footer-right">
    <a class="icon tiktok" href="#"><i class="fa-brands fa-tiktok"></i></a>
    <a class="icon snapchat" href="#"><i class="fa-brands fa-snapchat"></i></a>
    <a class="icon x" href="#"><i class="fa-brands fa-x-twitter"></i></a>
  </div>
</footer>
<script>
function showOrder(){
  let orderId = localStorage.getItem("orderId");
  let total = localStorage.getItem("total");

  document.getElementById("orderId").innerText = orderId;
  document.getElementById("amount").innerText = total + " ريال";
}
</script>

</body>
