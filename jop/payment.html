<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الدفع</title>

  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
  <img src="img/logo.png" class="logo">
</header>

<div class="container">

  <h2>الدفع عبر مدى</h2>

  <form onsubmit="pay(event)">

    <input type="text" placeholder="رقم البطاقة" maxlength="16" required>

    <input type="text" placeholder="اسم حامل البطاقة" required>

    <div class="row">
      <input type="text" placeholder="MM/YY" required>
      <input type="text" placeholder="CVV" maxlength="3" required>
    </div>

    <button type="submit">إتمام الدفع</button>

  </form>

</div>

<footer class="footer">
  <div class="footer-left">
    <h3>نجاة خليل</h3>
    <p> 0545400356</p>
  </div>

  <div class="footer-right">
    <a class="icon tiktok" href="#"><i class="fa-brands fa-tiktok"></i></a>
    <a class="icon snapchat" href="#"><i class="fa-brands fa-snapchat"></i></a>
    <a class="icon x" href="#"><i class="fa-brands fa-x-twitter"></i></a>
  </div>
</footer>
<script>
function showTotal(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = cart.reduce((sum, item) => sum + item.price, 0);
}
</script>

<script src="app.js"></script>

</body>
</html>
